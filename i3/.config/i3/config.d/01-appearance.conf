#####################
###    Base UI    ###
#####################

# Base font
font pango:$FONT Medium $FONT_SIZE_PX

# Window color scheme
# class                 border      backgr.     text        split
client.focused          $GREEN     $GREEN       $BLACK      $RED
client.focused_inactive $GREY       $GREY       $LIGHTGREY  $GREY
client.unfocused        $GREY       $GREY       $LIGHTGREY  $GREY
client.urgent           $RED        $RED        $BLACK      $RED
client.background       $BG

# Window borders
for_window [class=".*"] border pixel 0
for_window [class="Slack"] border none


# GTK theme settings
exec --no-startup-id gsettings set org.gnome.desktop.wm.preferences theme $GTK_THEME
exec --no-startup-id gsettings set $GNOME_SCHEMA gtk-theme $GTK_THEME
exec --no-startup-id gsettings set $GNOME_SCHEMA icon-theme $GTK_THEME
exec --no-startup-id gsettings set $GNOME_SCHEMA color-scheme 'prefer-dark'
exec --no-startup-id gsettings set $GNOME_SCHEMA cursor-size $CURSOR_SIZE_PX
exec --no-startup-id gsettings set $GNOME_SCHEMA text-scaling-factor 2
